name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 9 */5 * *" # Every 5 days at 9am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" = "503" ] || [ "$STATUS" = "402" ]; then
            echo "::warning::Supabase project appears to be paused (HTTP $STATUS). Visit the dashboard to restore it."
            exit 1
          fi
          echo "Supabase is alive."
